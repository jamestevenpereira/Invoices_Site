name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 9 */5 * *'  # a cada 5 dias às 9h UTC
  workflow_dispatch:        # permite correr manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s \
            "https://rguwiaxjapotlsvpvgpt.supabase.co/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -o /dev/null -w "Status: %{http_code}\n"

          curl -s \
            "https://rguwiaxjapotlsvpvgpt.supabase.co/auth/v1/health" \
            -o /dev/null -w "Auth Health: %{http_code}\n"
